---
name: CI

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: cp config_sample.py config.py
      - run: SKIP=no-commit-to-branch uv run prek run -a
      - run: uv run pytest
